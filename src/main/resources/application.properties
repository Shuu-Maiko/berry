spring.profiles.active=${APP_ENV:dev}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# jobrunner
jobrunr.background-job-server.enabled=true
jobrunr.dashboard.enabled=true

jobrunr.database.type=sql
# 1. Use Virtual Threads for extreme throughput on 0.1 vCPU
jobrunr.background-job-server.thread-type=VirtualThreads

# 2. Worker count scaled to 200 (negligible memory footprint per virtual thread)
jobrunr.background-job-server.worker-count=200

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder-secret}

# Frontend URLs
app.frontend-url=http://localhost:5173
app.frontend-redirect-url=${app.frontend-url}/oauth2/redirect

# RabbitMQ Configuration (Resolved via Profiles: application-dev.properties / application-prod.properties)
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2.0

# Virtual Threads & High-Concurrency Database settings
spring.threads.virtual.enabled=true
spring.datasource.hikari.maximum-pool-size=30

# Security
jwt.secret=${JWT_SECRET}

# Environment (dev or prod)
app.env=${APP_ENV:prod}
