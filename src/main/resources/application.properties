spring.datasource.url=jdbc:postgresql://localhost:5432/berry_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# jobrunner
jobrunr.background-job-server.enabled=true
jobrunr.dashboard.enabled=true

jobrunr.database.type=sql
# 1. Turn off Virtual Threads so it stops calculating the (Cores * 16) formula
jobrunr.background-job-server.thread-type=PlatformThreads

# 2. Tell JobRunr exactly how many workers you want
jobrunr.background-job-server.worker-count=2

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder-secret}

# Frontend URLs
app.frontend-url=http://localhost:5173
app.frontend-redirect-url=${app.frontend-url}/oauth2/redirect
